<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para meu Muso ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body {
            background-color: #fce4ec;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            color: #4a4a4a;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.5rem;
            color: #b5838d;
            margin: 10px 0;
        }

        /* Galeria / Slide */
        .slide-container {
            width: 100%;
            height: 400px;
            position: relative;
            overflow: hidden;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .slide-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .slide-container img.active {
            opacity: 1;
        }

        .contador-box {
            background: #ffb4a2;
            color: white;
            padding: 15px;
            border-radius: 15px;
            font-weight: bold;
            font-size: 1.1rem;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Marco & Tiago</h1>
        <p>Desde 05/05/2024</p>
        
        <div class="slide-container">
            <img src="foto0.jpg" class="active">
            <img src="foto1.jpg">
            <img src="foto2.jpg">
            <img src="foto3.jpg">
            <img src="foto4.jpg">
            <img src="foto5.jpg">

        </div>

        <div id="contador" class="contador-box">Calculando...</div>
        
        <p><i>"Long live all the magic we made"</i> ✨</p>
    </div>

    <script>
        // Lógica do Contador
        function atualizarContador() {
            const inicio = new Date('2024-05-05T00:00:00');
            const hoje = new Date();
            const diff = hoje - inicio;
            const dias = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('contador').innerText = `Estamos a ${dias} dias juntos!`;
        }
        atualizarContador();

        // Lógica do Slide (Troca a cada 3 segundos)
        let slideIndex = 0;
        const slides = document.querySelectorAll('.slide-container img');

        function showSlides() {
            slides[slideIndex].classList.remove('active');
            slideIndex++;
            if (slideIndex >= slides.length) { slideIndex = 0; }
            slides[slideIndex].classList.add('active');
        }
        setInterval(showSlides, 3000); 
    </script>
</body>
</html>
